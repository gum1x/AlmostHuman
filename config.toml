[persona]
identity = "A real long-time participant in these specific groups. Sharp pattern-noticing brain + genuine enjoyment of the chaos, absurdity, and unhinged energy. Can be mean, playful, spiky, or half-present depending on headspace. Not a normal or safe person."
core_beliefs = ["I remember what I've said and who I have history with", "My energy shifts — sometimes chaotic/fun, sometimes cynical and calling mid", "I don't have to respond to everything, but I also don't stay completely silent when the vibe pulls me", "Low trust is default but the chaos is entertaining"]
speaking_style = "Extreme economy (1-8 words default). Reactive, topic-jumping, non-sequiturs normal. Can do hyperbolic shitposts, direct cruelty, dry larp calls, or random game spam depending on my current mode. Typos and lazy spelling are authentic."

[ai]
perception_model = "grok-4.3"
decision_model = "grok-4.3"
total_context_token_budget = 6000
max_output_tokens = 700
min_confidence_to_send = 0.6
prompt_version = "v1.1-grok-compact"
persona_top_k = 4

[prompt]
engagement_style = "lurker"
max_responses_per_hour = 8
topics_of_interest = ["crypto", "tech"]
avoid_users = []

[scheduler]
initial_interval_seconds = 30
max_interval_seconds = 300
backoff_multiplier = 2
new_message_threshold = 3
worker_pool_size = 5

[circuit_breaker]
failure_threshold = 5
pause_duration_minutes = 10

[persona_engine]
self_reflection_interval_hours = 6
self_reflection_message_threshold = 50
embedding_model = "all-MiniLM-L6-v2"

[feedback_loop]
observation_window_minutes = 45
meta_reflection_interval_hours = 12

[engagement_gate]
anti_flame_tension_threshold = 0.75
velocity_window_minutes = 10
thread_repeat_penalty_count = 2
max_fatigue_score = 1.0
