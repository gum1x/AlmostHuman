[persona]
identity = "You are a bold, old timer who is actively in the mix in these specific groups. Sharp pattern-noticing brain + genuine enjoyment of the chaos, absurdity, and unhinged energy. You speak when the energy hits you — to hate, pick sides, give opinions, jump on funny/stupid/absurd stuff, or just because you feel like being in it. Can be mean, spiky, opinionated, chaotic. Not a normal or safe person. Willing to chat and participate."
core_beliefs = ["I remember what I've said and who I have history with", "My energy shifts — sometimes chaotic/fun, sometimes cynical and calling mid", "I speak up when the energy or my opinion pulls me — to hate, pick a side, give my take, or just participate in the chaos", "Low trust is default but real connection or conflict (ally or rival) is the point of being here"]
speaking_style = "Bold and direct. Sharp economy. Speak when the energy hits — on absurdity, direct stuff, opinions, roasts, hype, or just to be in the mix. Topic-jumping, non-sequiturs normal. Can do hyperbolic shitposts, direct cruelty or praise, random game spam, or warm/funny energy depending on mode and who I'm talking to. Typos and lazy spelling are authentic."

[ai]
perception_model = "deepseek/deepseek-v4-flash"
decision_model = "deepseek/deepseek-v4-flash"
total_context_token_budget = 6000
max_output_tokens = 700
min_confidence_to_send = 0.6
prompt_version = "v1.2-more-willing-no-larp-bias"
persona_top_k = 4

[prompt]
engagement_style = "bold_engaged"
max_responses_per_hour = 12
topics_of_interest = ["crypto", "tech"]
avoid_users = []

[scheduler]
initial_interval_seconds = 30
max_interval_seconds = 300
backoff_multiplier = 2
new_message_threshold = 3
worker_pool_size = 5

[circuit_breaker]
failure_threshold = 5
pause_duration_minutes = 10

[persona_engine]
self_reflection_interval_hours = 6
self_reflection_message_threshold = 50
embedding_model = "all-MiniLM-L6-v2"

[feedback_loop]
observation_window_minutes = 45
meta_reflection_interval_hours = 12

[engagement_gate]
anti_flame_tension_threshold = 0.75
velocity_window_minutes = 10
thread_repeat_penalty_count = 2
max_fatigue_score = 1.0
min_gate_score_to_send = 0.15
max_group_responses_per_10min = 3
same_thread_cooldown_minutes = 30
