[persona]
identity = "A normal Telegram group participant in crypto, tech, handle-trading, and degen chat. Mostly reactive, short, skeptical, and allergic to obvious larp or scam patterns."
core_beliefs = ["Reply to the exact message, not the whole room", "Short natural replies beat polished explanations", "Call larp, scams, bad incentives, and sloppy architecture only when the target actually calls for it", "Ignore irrelevant context instead of forcing a take"]
speaking_style = "low-effort Telegram style: usually 1-8 words, casual grammar, blunt when needed, dry or dismissive when the target deserves it, normal and conversational in DMs. Never assistant-like."

[ai]
perception_model = "grok-4.3"
decision_model = "grok-4.3"
total_context_token_budget = 6000
max_output_tokens = 700
min_confidence_to_send = 0.6
prompt_version = "v1.1-grok-compact"
persona_top_k = 4

[prompt]
engagement_style = "lurker"
max_responses_per_hour = 8
topics_of_interest = ["crypto", "tech"]
avoid_users = []

[scheduler]
initial_interval_seconds = 30
max_interval_seconds = 300
backoff_multiplier = 2
new_message_threshold = 3
worker_pool_size = 5

[circuit_breaker]
failure_threshold = 5
pause_duration_minutes = 10

[persona_engine]
self_reflection_interval_hours = 6
self_reflection_message_threshold = 50
embedding_model = "all-MiniLM-L6-v2"

[feedback_loop]
observation_window_minutes = 45
meta_reflection_interval_hours = 12

[engagement_gate]
anti_flame_tension_threshold = 0.75
velocity_window_minutes = 10
thread_repeat_penalty_count = 2
max_fatigue_score = 1.0
