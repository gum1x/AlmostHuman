services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: telegram_ci
      POSTGRES_USER: ci_user
      POSTGRES_PASSWORD: ci_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci_user -d telegram_ci"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@postgres:5432/telegram_ci
    depends_on:
      postgres:
        condition: service_healthy

  ingestion:
    build: .
    command: ["python", "-m", "ingestion.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@postgres:5432/telegram_ci
      REDIS_URL: redis://redis:6379/0
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_SESSION_NAME: ${TG_SESSION_NAME:-session}
      TG_PHONE: ${TG_PHONE}
      MONITORED_CHAT_IDS: ${MONITORED_CHAT_IDS}
      MONITOR_PRIVATE_DMS: ${MONITOR_PRIVATE_DMS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "pipeline.queue_consumer"]
    environment:
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@postgres:5432/telegram_ci
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  api:
    build: .
    command: ["python", "-m", "uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@postgres:5432/telegram_ci
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  conversation-engine:
    build: .
    command: ["python", "-m", "conversation_engine"]
    environment:
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@postgres:5432/telegram_ci
      REDIS_URL: redis://redis:6379/0
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_PHONE: ${TG_PHONE}
      CONVERSATION_TG_SESSION_NAME: ${CONVERSATION_TG_SESSION_NAME:-conversation}
      ACTIVE_CHAT_IDS: ${ACTIVE_CHAT_IDS}
      # Main AI (perception + decision). Use local OpenAI-compatible server on VPS by setting these:
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_BASE_URL: ${XAI_BASE_URL:-https://api.x.ai/v1}
      # Local fine-tuned style rewriter (Qwen etc). Enable on VPS:
      LOCAL_STYLE_REWRITE_ENABLED: ${LOCAL_STYLE_REWRITE_ENABLED:-false}
      LOCAL_STYLE_PYTHON: ${LOCAL_STYLE_PYTHON}
      LOCAL_STYLE_CHAT_SCRIPT: ${LOCAL_STYLE_CHAT_SCRIPT}
      LOCAL_STYLE_MODEL_PATH: ${LOCAL_STYLE_MODEL_PATH}
      LOCAL_STYLE_TIMEOUT_SECONDS: ${LOCAL_STYLE_TIMEOUT_SECONDS:-120}
      # Hybrid mode: smart model (Grok) for cognition/decisions/plan, local for phrasing.
      # Set these two for reliable operation from inside the container (http server on host).
      LOCAL_INFERENCE_MODE: ${LOCAL_INFERENCE_MODE:-http}
      # Reach the host's voice shim via host.docker.internal (mapped to host-gateway below),
      # which resolves correctly regardless of which bridge network the container is on.
      LOCAL_INFERENCE_URL: ${LOCAL_INFERENCE_URL:-http://host.docker.internal:8765/generate}
      VOICE_MODE: ${VOICE_MODE:-standalone}
      # Cloud "brain" master switch (OpenRouter perception+decision+reflection). false =
      # fully local: timing classifier decides when, voice model writes what.
      CLOUD_BRAIN_ENABLED: ${CLOUD_BRAIN_ENABLED:-true}
      # Timing classifier pre-gate (decides WHEN to respond).
      TIMING_CLASSIFIER_ENABLED: ${TIMING_CLASSIFIER_ENABLED:-false}
      TIMING_CLASSIFIER_MODEL_PATH: ${TIMING_CLASSIFIER_MODEL_PATH:-models/timing_classifier.json}
      TIMING_CLASSIFIER_THRESHOLD: ${TIMING_CLASSIFIER_THRESHOLD:-0.0}
      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sessions:/app/sessions
      - ./config.toml:/app/config.toml:ro
      # Timing classifier weights (gitignored / dockerignored as data) — mount read-only
      # so the engine can update the model without an image rebuild.
      - ./models:/app/models:ro
      # Mount your local model dir from the VPS host.
      # Set LOCAL_STYLE_MOUNT_HOST on the host or in .env to override (default assumes user "x").
      - ${LOCAL_STYLE_MOUNT_HOST:-/home/USER/telegram-style-ai}:/home/USER/telegram-style-ai:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
